<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Opexx</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
    }

    .wrap {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    #coverGif {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    #playWrap {
      display: none;
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.25);
      align-items: center;
      justify-content: center;
      flex-direction: column;
      text-align: center;
      font-family: Arial, sans-serif;
      color: white;
    }

    #playBtn {
      background: rgba(255,255,255,0.92);
      color: #111;
      border: none;
      padding: 14px 22px;
      border-radius: 10px;
      font-size: 16px;
      cursor: pointer;
    }

    #note {
      margin-top: 10px;
      font-size: 13px;
      opacity: 0.95;
    }
  </style>
</head>
<body>

  <div class="wrap">
    <img
      id="coverGif"
      src="https://raw.githubusercontent.com/Sljumde/brownwall/main/opexx.gif"
      alt="Opexx"
    >

    <audio id="bgMusic" autoplay loop>
      <source src="https://raw.githubusercontent.com/Sljumde/brownwall/main/darknight.mp3" type="audio/mpeg">
      Your browser does not support audio.
    </audio>

    <div id="playWrap">
      <button id="playBtn">Play Music</button>
      <div id="note">Autoplay was blocked. Click once.</div>
    </div>
  </div>

  <script>
    const audio = document.getElementById("bgMusic");
    const playWrap = document.getElementById("playWrap");
    const playBtn = document.getElementById("playBtn");

    async function startMusic() {
      try {
        await audio.play();
        playWrap.style.display = "none";
      } catch (e) {
        playWrap.style.display = "flex";
      }
    }

    playBtn.addEventListener("click", async () => {
      try {
        await audio.play();
        playWrap.style.display = "none";
      } catch (e) {
        console.log("Playback still blocked.");
      }
    });

    window.addEventListener("load", startMusic);
  </script>

</body>
</html>
